    <!-- 자바스크립트 로직 -->
    <script>
        // 메뉴 데이터 설정
        const menuData = {
            '한식': ['비빔밥', '김치찌개', '삼겹살', '제육볶음', '불고기', '떡볶이', '갈비탕', '된장찌개'],
            '중식': ['짜장면', '짬뽕', '탕수육', '마라탕', '양꼬치', '볶음밥', '멘보샤', '깐풍기'],
            '일식': ['초밥', '돈카츠', '라멘', '우동', '규동', '소바', '텐동', '야키토리'],
            '양식': ['파스타', '피자', '스테이크', '리조또', '햄버거', '샌드위치', '감바스', '샐러드']
        };

        const categories = Object.keys(menuData);
        let currentCategory = '';
        let isSpinning = false;

        // 색상 파레트
        const colors = [
            '#FF6B6B', '#4D96FF', '#6BCB77', '#FFD93D', 
            '#9B5DE5', '#F15BB5', '#00BBF9', '#00F5D4',
            '#FF9F1C', '#E71D36', '#2EC4B6', '#FF9F1C'
        ];

        // 페이지 로드 시 초기화
        window.onload = function() {
            drawRoulette('canvas-step1', categories);
        };

        // 룰렛 그리기 함수
        function drawRoulette(canvasId, items) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            // 해상도 조절을 위한 캔버스 크기 세팅
            canvas.width = 500;
            canvas.height = 500;
            
            const width = canvas.width;
            const height = canvas.height;
            const center = width / 2;
            const radius = width / 2 - 10;
            
            ctx.clearRect(0, 0, width, height);
            
            const arcSize = (2 * Math.PI) / items.length;
            
            for (let i = 0; i < items.length; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, i * arcSize, (i + 1) * arcSize);
                ctx.lineTo(center, center);
                ctx.fill();
                
                // 테두리선
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 텍스트 추가
                ctx.save();
                ctx.fillStyle = '#111827';
                ctx.font = 'bold 22px "Noto Sans KR"';
                ctx.textAlign = 'right';
                ctx.translate(center, center);
                ctx.rotate(i * arcSize + arcSize / 2);
                ctx.fillText(items[i], radius - 30, 8);
                ctx.restore();
            }
        }

        // 1단계: 룰렛 돌리기
        function spinStep1() {
            if (isSpinning) return;
            isSpinning = true;

            const wheel = document.getElementById('canvas-step1');
            const randAngle = Math.floor(Math.random() * 360) + 1440; // 최소 4바퀴 회전
            
            wheel.style.transform = `rotate(${randAngle}deg)`;

            setTimeout(() => {
                isSpinning = false;
                // 당첨된 인덱스 계산 (화살표는 상단 12시 방향인 270도 기준)
                const actualDegree = randAngle % 360;
                const arcSize = 360 / categories.length;
                
                // 회전각도와 캔버스 좌표계 사이의 오프셋 보정 계산
                const pointerAngle = (270 - actualDegree + 360) % 360;
                const winnerIndex = Math.floor(pointerAngle / arcSize);
                const selected = categories[winnerIndex];

                showModal('카테고리 결정!', `🎯 ${selected}`, '음식 종류가 결정되었습니다!', () => {
                    selectCategory(selected);
                    closeModal();
                }, '2단계 진행');

            }, 4000); // 4초 뒤 결과 도출
        }

        // 카테고리 바로 선택하기 또는 1단계 성공 후 전환
        function selectCategory(category) {
            currentCategory = category;
            
            // UI 변경
            document.getElementById('step1-card').classList.add('hidden');
            document.getElementById('step2-card').classList.remove('hidden');
            
            document.getElementById('step1-indicator').className = "flex-1 text-center text-gray-400 pb-1 text-sm";
            document.getElementById('step2-indicator').className = "flex-1 text-center font-bold text-emerald-600 border-b-2 border-emerald-600 pb-1 text-sm";
            
            document.getElementById('selected-category-badge').innerText = `${category} 선정됨`;
            
            // 2단계 룰렛 그리기
            setTimeout(() => {
                // 트랜지션 초기화
                const wheel = document.getElementById('canvas-step2');
                wheel.style.transform = 'rotate(0deg)';
                drawRoulette('canvas-step2', menuData[category]);
            }, 50);
        }

        // 2단계: 최종 메뉴 룰렛 돌리기
        function spinStep2() {
            if (isSpinning) return;
            isSpinning = true;

            const menus = menuData[currentCategory];
            const wheel = document.getElementById('canvas-step2');
            const randAngle = Math.floor(Math.random() * 360) + 1440;
            
            wheel.style.transform = `rotate(${randAngle}deg)`;

            setTimeout(() => {
                isSpinning = false;
                const actualDegree = randAngle % 360;
                const arcSize = 360 / menus.length;
                
                const pointerAngle = (270 - actualDegree + 360) % 360;
                const winnerIndex = Math.floor(pointerAngle / arcSize);
                const finalMenu = menus[winnerIndex];

                showModal('최종 결정 메뉴', `🍽️ ${finalMenu}`, '오늘의 식사는 이걸로 결정되었습니다!', () => {
                    closeModal();
                    goBack();
                }, '다시 고르기');

            }, 4000);
        }

        // 처음으로 돌아가기
        function goBack() {
            document.getElementById('step1-card').classList.remove('hidden');
            document.getElementById('step2-card').classList.add('hidden');
            
            document.getElementById('step1-indicator').className = "flex-1 text-center font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1 text-sm";
            document.getElementById('step2-indicator').className = "flex-1 text-center text-gray-400 pb-1 text-sm";
            
            // 1단계 룰렛도 회전값 리셋
            document.getElementById('canvas-step1').style.transform = 'rotate(0deg)';
        }

        // 모달 제어 함수
        function showModal(subtitle, title, description, callback, actionText) {
            const modal = document.getElementById('result-modal');
            const card = document.getElementById('modal-card');
            
            document.getElementById('modal-subtitle').innerText = subtitle;
            document.getElementById('modal-title').innerText = title;
            
            const actionBtn = document.getElementById('modal-action-btn');
            actionBtn.innerText = actionText;
            actionBtn.onclick = callback;

            // 모달 노출 애니메이션
            modal.classList.remove('hidden');
            setTimeout(() => {
                card.classList.remove('scale-95');
                card.classList.add('scale-100');
            }, 50);
        }

        function closeModal() {
            const modal = document.getElementById('result-modal');
            const card = document.getElementById('modal-card');
            
            card.classList.remove('scale-100');
            card.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }
    </script>
</body>
</html>
